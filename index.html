<!DOCTYPE html>
<html>
<head>
<title>AI Anime Generator</title>
</head>

<body>

<h1>AI Anime Generator</h1>

<input id="prompt" placeholder="write your prompt">
<button onclick="generate()">Generate</button>

<br><br>

<img id="image" width="300">

<script>

async function generate() {

let prompt = document.getElementById("prompt").value;

let response = await fetch("https://api.replicate.com/v1/predictions", {
method: "POST",
headers: {
"Authorization": "Token r8_8I2BKrfL5gFO0Vvxn7qaBeKLfWRKpiJ16XP0I",
"Content-Type": "application/json"
},
body: JSON.stringify({
version: "db21e45b037fa4e1b8f5fcbad3c0a6f4c8c6f7a8d9c3c3a5c9f7b0e1d5f9a6c",
input: {
prompt: prompt
}
})
});

let data = await response.json();

setTimeout(async () => {

let result = await fetch(data.urls.get, {
headers: {
"Authorization": "Token r8_8I2BKrfL5gFO0Vvxn7qaBeKLfWRKpiJ16XP0I"
}
});

let resultData = await result.json();

document.getElementById("image").src = resultData.output[0];

}, 6000);

}

</script>

</body>
</html>
